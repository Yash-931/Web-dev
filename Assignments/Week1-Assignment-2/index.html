<html>
    <head>
        <title>Eleven labs contact</title>
        <link href="./index.css" rel="stylesheet" />
    </head>
    <body>
        <!-- outer wrapper div -->
        <div class="wrapper">
            <!-- left div -->
             <div class="left-div">
                <div>
                    <!-- top image text -->
                     <div class="logo">||ElevenLabs</div>

                     <h2 class="heading">Contact our sales team</h2>
                    
                     <!-- list on the left side -->
                     <div>
                        <div>Custom pricing and elevated concurrency</div>
                        <div>Enterprise-grade security including SOC II, GDPR and HIPAA compliance</div>
                        <div>Enterprise support and SLAs</div>
                     </div>

                     <div>Trusted by 10,000+ leading businesses</div>
                </div>
             </div>

             <!-- right div -->
            <div class="right-div">
                <!-- right part main form -->
                 <div class="main-form">
                    <div class="right-heading-div">
                        <div><h2 class="heading">Contact sales form</h2></div>
                        <div>Please fill out the form below to get started</div>
                    </div>

                    <div>
                        <label for="website">Company website</label>
                        <input type="text" class="website">
                    </div>

                    <div>
                        <label for="business-email">Business Email</label>
                        <input type="text" class="business-email">
                    </div>

                    <div>
                        <div>
                            <button>Next</button>
                        </div>

                        <div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                        </div>

                    </div>
                 </div>

            </div>

        </div>
    </body>
</html>
